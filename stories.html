<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Speculative Fiction - Rose Bertrand</title>

  <link rel="icon" type="image/png" href="images/favicon-round.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Special+Elite&display=swap"
    rel="stylesheet"
  >

  <!-- foundation -->
  <link rel="stylesheet" href="css/variables.css?v=3">
  <link rel="stylesheet" href="css/layout.css?v=4">
  <link rel="stylesheet" href="css/sidebars.css?v=3">

  <!-- top -->
  <link rel="stylesheet" href="css/0_top/portrait.css?v=5">
  <link rel="stylesheet" href="css/0_top/stamp.css?v=2">

  <!-- middle (all page views loaded — this is a single-page site) -->
  <link rel="stylesheet" href="css/1_middle/cards.css?v=3">
  <link rel="stylesheet" href="css/about.css?v=5">
  <link rel="stylesheet" href="css/nonfiction.css?v=4">

  <!-- bottom -->
  <link rel="stylesheet" href="css/2_bottom/socials.css?v=3">
  <link rel="stylesheet" href="css/2_bottom/footer.css?v=3">

  <!-- moving bug + loop nav -->
  <link rel="stylesheet" href="easter-eggs/moving_bug/moving_bug.css?v=7">
  <link rel="stylesheet" href="css/nav.css?v=3">

  <!-- always last -->
  <link rel="stylesheet" href="css/mobile.css?v=2">
</head>


<body
  data-theme="blue"
  data-page="stories"
  data-blurb="A shelf of short fiction — pick a tab to start reading."
  data-portrait-light="images/portraits/01_light_blue.webp"
  data-portrait-dark="images/portraits/01_dark_blue.webp">
    <main class="page">

  <aside class="rail rail--left" aria-hidden="true">
    <img id="rail-left" class="rail-img" src="components/01_blue/spaceship.svg?v=2" alt="">
  </aside>

  <section class="center">

    <div id="site-header"></div>

    <div id="view">
      <div class="catalog">

        <div
          class="tabs"
          id="tabs"
          role="tablist">
        </div>

        <div
          class="body"
          id="body">

          <span
            class="hole"
            aria-hidden="true">
          </span>

          <div
            class="story"
            id="story">
          </div>

        </div>

      </div>
    </div>

    <div id="site-footer"></div>

  </section>

  <aside class="rail rail--right" aria-hidden="true">
    <img id="rail-right" class="rail-img" src="components/01_blue/starchart.svg?v=2" alt="">
  </aside>

</main>

<script src="js/app.js?v=3"></script>
</body>

</html>
