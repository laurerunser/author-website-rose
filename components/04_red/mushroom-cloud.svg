  <!-- cap billows (staggered convex-up swirls) -->
  <g fill="none" stroke="#f7dcd2" stroke-width="0.8" opacity="0.65">
    <path d="M14 248 q 7 -11 15 -3"/>
    <path d="M34 256 q 8 -12 17 -2"/>
    <path d="M58 246 q 7 -12 16 -3"/>
    <path d="M24 214 q 9 -11 17 -1"/>
    <path d="M50 200 q 8 -10 16 1"/>
    <path d="M40 228 q 6 -9 13 -1"/>
  </g>

  <!-- stem swirl -->
  <g fill="none" stroke="#f7dcd2" stroke-width="0.7" opacity="0.55">
    <path d="M38 420 C 49 432 49 452 39 470"/>
    <path d="M51 540 C 40 556 40 580 51 598"/>
    <path d="M36 622 C 49 638 49 666 37 688"/>
