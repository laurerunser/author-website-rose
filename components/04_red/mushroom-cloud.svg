    <line x1="45" y1="340" x2="45" y2="740"/>
    <line x1="6" y1="430" x2="84" y2="430"/>
    <line x1="6" y1="600" x2="84" y2="600"/>
  </g>

  <!-- rising stem -->
  <path d="M40 296
           C 36 430 33 580 28 700
