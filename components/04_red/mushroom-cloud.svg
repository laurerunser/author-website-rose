  <!-- annotations -->
  <g fill="#e8765e" font-family="monospace">
    <text x="84" y="150" font-size="8" transform="rotate(-90 84 150)">FIG. IV — FALLOUT</text>
    <text x="74" y="560" font-size="7.5" transform="rotate(-90 74 560)">T + 09 s</text>
    <text x="10" y="734" font-size="7.5">SITE R-04</text>
