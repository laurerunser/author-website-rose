<svg viewBox="0 0 90 820" xmlns="http://www.w3.org/2000/svg">

  <!-- ground = the left edge; a field of fungi grows out of it sideways -->
  <line x1="3" y1="26" x2="3" y2="794"
        stroke="#efe6d8" stroke-width="1.2" stroke-dasharray="9 3 1.5 3"/>
  <g stroke="#b08968" stroke-width="0.7" opacity="0.7">
    <path d="M3 120 l 7 -2 M3 320 l 7 -2 M3 520 l 7 -2 M3 700 l 7 -2"/>
  </g>

  <!-- 1 · morel (honeycomb cone) -->
  <g transform="translate(0,104)">
    <path d="M3 -2 L18 -2.4 L18 2.4 L3 2 Z" fill="rgba(176,137,90,.32)" stroke="#efe6d8" stroke-width="1.4" stroke-linejoin="round"/>
    <path d="M18 -11 C 33 -10 45 -5 45 0 C 45 5 33 10 18 11 Z" fill="rgba(176,137,90,.28)" stroke="#efe6d8" stroke-width="1.5" stroke-linejoin="round"/>
    <g stroke="#b08968" stroke-width="0.7" opacity="0.9">
      <path d="M25 -8 L25 8 M32 -7 L32 7 M39 -5 L39 5 M19 -4 L44 -4 M19 0 L45 0 M19 4 L44 4"/>
    </g>
  </g>

  <!-- 2 · chanterelle (wavy funnel) -->
  <g transform="translate(0,220)">
    <path d="M3 -2 C 11 -1 15 -4 19 -8 M3 2 C 11 3 15 2 20 -2" fill="none" stroke="#efe6d8" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M19 -8 C 27 -18 42 -19 49 -15 C 45 -12 47 -9 50 -6 C 43 -8 47 -2 49 3
             C 41 -1 30 5 20 -2 Z" fill="rgba(239,230,216,.14)" stroke="#efe6d8" stroke-width="1.5" stroke-linejoin="round"/>
    <g stroke="#b08968" stroke-width="0.6" opacity="0.8"><path d="M24 -6 L44 -12 M25 -2 L46 -6 M24 1 L43 0"/></g>
  </g>

  <!-- 3 · round bolete (brown cap) -->
  <g transform="translate(0,332)">
    <path d="M3 -2.6 L20 -2 L20 2 L3 2.6 Z" fill="rgba(176,137,90,.4)" stroke="#efe6d8" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M20 -13 C 36 -13 42 -6 42 0 C 42 6 36 13 20 13 Z" fill="rgba(176,137,90,.45)" stroke="#efe6d8" stroke-width="1.6" stroke-linejoin="round"/>
    <ellipse cx="33" cy="-4" rx="3" ry="2" fill="rgba(239,230,216,.5)"/>
  </g>

  <!-- 4 · slender red bell -->
  <g transform="translate(0,452)">
    <path d="M3 -1.4 C 14 -1 22 -2 27 -3 M3 1.4 C 14 1 22 1 26 0" fill="none" stroke="#efe6d8" stroke-width="1.3" stroke-linecap="round"/>
    <path d="M26 -2 C 26 -16 30 -22 33 -22 C 36 -22 40 -14 40 -2 C 34 1 32 1 26 -2 Z"
          fill="rgba(207,91,67,.4)" stroke="#cf5b43" stroke-width="1.5" stroke-linejoin="round"/>
    <g stroke="#cf5b43" stroke-width="0.7" opacity="0.8"><path d="M30 -2 l 0 6 M34 -2 l 0 6"/></g>
  </g>

  <!-- 5 · clustered enoki (thin) -->
  <g transform="translate(0,572)" fill="none" stroke="#efe6d8" stroke-width="1.2" stroke-linecap="round">
    <path d="M3 0 C 16 -2 26 -8 32 -16"/><circle cx="33" cy="-17" r="3.2" fill="rgba(239,230,216,.18)"/>
    <path d="M3 1 C 18 0 30 -3 38 -7"/><circle cx="39" cy="-8" r="3" fill="rgba(239,230,216,.18)"/>
    <path d="M3 2 C 18 4 30 4 40 2"/><circle cx="41" cy="2" r="3.2" fill="rgba(239,230,216,.18)"/>
    <path d="M3 3 C 16 6 26 11 33 17"/><circle cx="34" cy="18" r="2.8" fill="rgba(239,230,216,.18)"/>
  </g>

  <!-- 6 · oyster shelf (no stem) -->
  <g transform="translate(0,700)">
    <path d="M3 -10 C 18 -14 34 -12 42 -4 C 34 0 18 2 3 0 Z" fill="rgba(176,137,90,.3)" stroke="#efe6d8" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M3 2 C 16 0 28 2 36 7 C 26 11 14 12 3 10 Z" fill="rgba(176,137,90,.3)" stroke="#efe6d8" stroke-width="1.5" stroke-linejoin="round"/>
    <g stroke="#b08968" stroke-width="0.6" opacity="0.8"><path d="M8 -6 L38 -5 M8 -2 L40 -2 M8 6 L33 7"/></g>
  </g>

  <!-- moss + spores -->
  <g fill="#82c98a">
    <circle cx="8" cy="160" r="1.4"/><circle cx="11" cy="166" r="1.1"/>
    <circle cx="9" cy="612" r="1.4"/><circle cx="13" cy="618" r="1.1"/>
  </g>
  <g fill="#b08968">
    <circle cx="56" cy="180" r="1.1"/><circle cx="60" cy="400" r="1.1"/>
    <circle cx="54" cy="540" r="1.1"/><circle cx="58" cy="660" r="1.1"/>
  </g>

  <!-- annotations -->
  <text x="84" y="300" fill="#b08968" font-family="monospace" font-size="8" transform="rotate(-90 84 300)">FIG. A — FUNGI</text>
  <text x="14" y="784" fill="#b08968" font-family="monospace" font-size="7.5">SPECIMENS · 6</text>
</svg>
