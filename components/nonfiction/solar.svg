<svg viewBox="0 0 90 820" xmlns="http://www.w3.org/2000/svg">

  <!-- orbits (ellipses squashed horizontally to fit the strip) -->
  <g fill="none" stroke="#efe6d8" stroke-width="0.8" opacity="0.55">
    <ellipse cx="45" cy="400" rx="16" ry="72"/>
    <ellipse cx="45" cy="400" rx="26" ry="150"/>
    <ellipse cx="45" cy="400" rx="34" ry="225"/>
    <ellipse cx="45" cy="400" rx="46" ry="355"/>
  </g>

  <!-- asteroid belt: a dashed orbit with scattered rocks -->
  <ellipse cx="45" cy="400" rx="40" ry="290"
           fill="none" stroke="#b08968" stroke-width="0.8" stroke-dasharray="2 5" opacity="0.7"/>
  <g fill="#b08968">
    <circle cx="84" cy="385" r="1.1"/><circle cx="83" cy="430" r="0.9"/>
    <circle cx="7" cy="360" r="1"/><circle cx="6" cy="455" r="1.1"/>
    <circle cx="45" cy="110" r="1"/><circle cx="45" cy="690" r="1.1"/>
    <circle cx="78" cy="540" r="0.9"/><circle cx="12" cy="560" r="0.9"/>
  </g>

  <!-- central star -->
  <g stroke="#efe6d8" stroke-width="1" stroke-linecap="round">
    <line x1="45" y1="385" x2="45" y2="378"/><line x1="45" y1="415" x2="45" y2="422"/>
    <line x1="30" y1="400" x2="23" y2="400"/><line x1="60" y1="400" x2="67" y2="400"/>
    <line x1="35" y1="390" x2="30" y2="385"/><line x1="55" y1="410" x2="60" y2="415"/>
    <line x1="55" y1="390" x2="60" y2="385"/><line x1="35" y1="410" x2="30" y2="415"/>
  </g>
  <circle cx="45" cy="400" r="8" fill="rgba(239,230,216,.25)" stroke="#efe6d8" stroke-width="1.6"/>
  <circle cx="45" cy="400" r="3" fill="#cf5b43"/>

  <!-- planet A (inner, brown) -->
  <circle cx="45" cy="328" r="3.5" fill="rgba(176,137,90,.6)" stroke="#efe6d8" stroke-width="1.2"/>

  <!-- planet B (ringed) -->
  <g>
    <circle cx="60" cy="277" r="6" fill="rgba(239,230,216,.3)" stroke="#efe6d8" stroke-width="1.4"/>
    <ellipse cx="60" cy="277" rx="11" ry="3.6" fill="none" stroke="#efe6d8" stroke-width="1.2" transform="rotate(-22 60 277)"/>
  </g>

  <!-- planet C (green) -->
  <circle cx="26" cy="584" r="5" fill="rgba(130,201,138,.45)" stroke="#82c98a" stroke-width="1.4"/>

  <!-- planet D (outer, red) -->
  <circle cx="45" cy="755" r="4.5" fill="rgba(207,91,67,.5)" stroke="#cf5b43" stroke-width="1.3"/>

  <!-- a couple of distant stars -->
  <g fill="#efe6d8">
    <path d="M76 150 L77 153 L80 154 L77 155 L76 158 L75 155 L72 154 L75 153 Z"/>
    <path d="M14 700 L15 703 L18 704 L15 705 L14 708 L13 705 L10 704 L13 703 Z"/>
  </g>

  <!-- annotations -->
  <text x="84" y="220" fill="#b08968" font-family="monospace" font-size="8" transform="rotate(-90 84 220)">FIG. B — ORBITS</text>
  <text x="12" y="392" fill="#b08968" font-family="monospace" font-size="7">SYSTEM R-09</text>
</svg>
