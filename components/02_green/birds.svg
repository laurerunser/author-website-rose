<svg viewBox="0 0 90 820" xmlns="http://www.w3.org/2000/svg">

  <!-- faint plot grid -->
  <g stroke="#74c98a" stroke-width="0.6" opacity="0.4" stroke-dasharray="1.5 5">
    <line x1="24" y1="40" x2="24" y2="788"/>
    <line x1="66" y1="40" x2="66" y2="788"/>
    <line x1="6" y1="250" x2="84" y2="250"/>
    <line x1="6" y1="500" x2="84" y2="500"/>
    <line x1="6" y1="690" x2="84" y2="690"/>
  </g>

  <!-- flight path -->
  <path d="M64 724 C 44 626 60 524 46 432
           C 33 352 52 262 40 172
           C 37 150 38 134 41 120"
        fill="none" stroke="#74c98a" stroke-width="1"
        stroke-dasharray="4 4" opacity="0.7"/>

  <!-- the flock: gull marks, smaller toward the top -->
  <g fill="none" stroke="#eaf6ec" stroke-width="1.5"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(62,706) scale(1)"/>
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(50,640) scale(0.95)"/>
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(60,576) scale(0.9)"/>
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(43,512) scale(0.85)"/>
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(55,452) scale(0.8)"/>
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(39,398) scale(0.72)"/>
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(50,340) scale(0.66)"/>
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(38,290) scale(0.58)"/>
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(46,244) scale(0.5)"/>
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(38,202) scale(0.44)"/>
    <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0" transform="translate(44,166) scale(0.38)"/>
  </g>

  <!-- lead bird, highlighted -->
  <path d="M-7 0 C -4 -5 -2 -5 0 -1 C 2 -5 4 -5 7 0"
        transform="translate(41,132) scale(0.34)"
        fill="none" stroke="#74c98a" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- migration heading marker -->
  <g stroke="#74c98a" stroke-width="0.9" fill="none">
    <line x1="41" y1="108" x2="41" y2="92"/>
    <path d="M38 98 L41 90 L44 98"/>
  </g>

  <!-- annotations -->
  <g fill="#74c98a" font-family="monospace">
    <text x="40" y="86" font-size="6.5" text-anchor="middle">N</text>
    <text x="80" y="430" font-size="8" transform="rotate(-90 80 430)">FIG. II — FLOCK</text>
    <text x="10" y="754" font-size="7.5">MIGRATION · 11</text>
  </g>
