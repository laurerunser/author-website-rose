<svg viewBox="0 0 90 820" xmlns="http://www.w3.org/2000/svg">

  <!-- flowing ecliptic arcs (decorative, not a grid) -->
  <g fill="none" stroke="#b98fd9" stroke-width="0.9"
     stroke-dasharray="2 4" opacity="0.55">
    <path d="M2 80 C 40 180 20 320 60 430 C 84 500 50 560 64 612"/>
    <path d="M80 70 C 50 170 78 280 44 380"/>
  </g>

  <!-- crescent moon, up at the top -->
  <path d="M64 96
           A 18 18 0 1 1 64 130
           A 13 13 0 1 0 64 96 Z"
        fill="rgba(185,143,217,.18)"
        stroke="#efe6f7" stroke-width="1.4"
        stroke-linejoin="round"/>

  <!-- constellation lines (clustered up top) -->
  <g fill="none" stroke="#b98fd9" stroke-width="0.9" opacity="0.85">
    <!-- cassiopeia-like W -->
    <polyline points="14,188 26,168 40,194 54,170 66,196"/>
    <!-- ladle -->
    <polyline points="22,268 36,278 50,282 62,274 70,254 78,234"/>
    <!-- triangle -->
    <polygon points="28,372 54,352 44,406"/>
    <!-- swan / cross -->
    <path d="M45 452 L45 522 M26 476 L64 476 M45 476 L52 458 M45 476 L40 460"/>
  </g>

  <!-- stars at the joints -->
  <g fill="#efe6f7">
    <circle cx="14" cy="188" r="1.7"/><circle cx="26" cy="168" r="2.1"/>
    <circle cx="40" cy="194" r="1.6"/><circle cx="54" cy="170" r="2"/>
    <circle cx="66" cy="196" r="1.7"/>
    <circle cx="22" cy="268" r="1.6"/><circle cx="36" cy="278" r="1.9"/>
    <circle cx="50" cy="282" r="1.6"/><circle cx="62" cy="274" r="1.7"/>
    <circle cx="70" cy="254" r="1.5"/><circle cx="78" cy="234" r="2"/>
    <circle cx="28" cy="372" r="1.8"/><circle cx="54" cy="352" r="2"/>
    <circle cx="44" cy="406" r="1.6"/>
    <circle cx="45" cy="452" r="2"/><circle cx="45" cy="522" r="1.7"/>
    <circle cx="26" cy="476" r="1.6"/><circle cx="64" cy="476" r="1.6"/>
  </g>

  <!-- decorative sparkles (top-weighted) -->
  <g fill="#efe6f7">
    <path d="M70 150 L71.4 153.6 L75 155 L71.4 156.4 L70 160 L68.6 156.4 L65 155 L68.6 153.6 Z"/>
    <path d="M16 240 L17.2 243 L20 244 L17.2 245 L16 248 L14.8 245 L12 244 L14.8 243 Z"/>
    <path d="M74 330 L75.4 333.6 L79 335 L75.4 336.4 L74 340 L72.6 336.4 L69 335 L72.6 333.6 Z"/>
    <path d="M20 470 L21.2 473 L24 474 L21.2 475 L20 478 L18.8 475 L16 474 L18.8 473 Z"/>
  </g>

  <!-- tiny field stars -->
  <g fill="#b98fd9">
    <circle cx="34" cy="130" r="1.1"/>
    <circle cx="50" cy="232" r="1.1"/>
    <circle cx="18" cy="330" r="1.1"/>
    <circle cx="66" cy="410" r="1.1"/>
    <circle cx="30" cy="560" r="1"/>
    <circle cx="60" cy="650" r="1"/>
  </g>

  <!-- annotations -->
  <g fill="#b98fd9" font-family="monospace">
    <text x="84" y="300" font-size="8" transform="rotate(-90 84 300)">FIG. V — ZODIAC</text>
    <text x="8" y="430" font-size="7.5">CASSIOPEIA</text>
    <text x="10" y="752" font-size="7.5">HOUSE R-05</text>
  </g>
</svg>
