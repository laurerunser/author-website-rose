<svg viewBox="0 0 90 820" xmlns="http://www.w3.org/2000/svg">
  <!-- lighter-green backdrop -->
  <rect width="90" height="820" fill="#607848"/>

  <!-- scattered stars -->
  <g fill="#f4ecd9">
    <circle cx="14" cy="38" r="1.3"/><circle cx="72" cy="58" r="1"/>
    <circle cx="79" cy="150" r="1.4"/><circle cx="11" cy="210" r="1"/>
    <circle cx="81" cy="330" r="1.2"/><circle cx="9" cy="430" r="1.3"/>
    <circle cx="79" cy="520" r="1"/><circle cx="13" cy="640" r="1.2"/>
  </g>
  <g fill="#e8c44a">
    <circle cx="26" cy="120" r="1.2"/><circle cx="67" cy="262" r="1.3"/>
    <circle cx="20" cy="540" r="1.2"/><circle cx="66" cy="700" r="1.3"/>
  </g>

  <!-- ================= ORBITS (off-white dashed) ================= -->
  <g fill="none" stroke="#f4ecd9" stroke-width="1" opacity="0.5" stroke-dasharray="3 4">
    <ellipse cx="45" cy="84" rx="34" ry="78"/>
    <ellipse cx="45" cy="84" rx="40" ry="160"/>
    <ellipse cx="45" cy="84" rx="44" ry="262"/>
    <ellipse cx="45" cy="84" rx="40" ry="378"/>
    <ellipse cx="45" cy="84" rx="32" ry="500"/>
  </g>

  <!-- ================= SUN (top) ================= -->
  <g stroke="#e8c44a" stroke-width="2" stroke-linecap="round">
    <line x1="45" y1="54" x2="45" y2="45"/><line x1="45" y1="114" x2="45" y2="123"/>
    <line x1="15" y1="84" x2="6" y2="84"/><line x1="75" y1="84" x2="84" y2="84"/>
    <line x1="24" y1="63" x2="17" y2="56"/><line x1="66" y1="63" x2="73" y2="56"/>
    <line x1="24" y1="105" x2="17" y2="112"/><line x1="66" y1="105" x2="73" y2="112"/>
  </g>
  <circle cx="45" cy="84" r="22" fill="#e8c44a" stroke="#6b4a2f" stroke-width="2"/>
  <circle cx="45" cy="84" r="13" fill="none" stroke="#6b4a2f" stroke-width="1" opacity="0.55"/>

  <!-- ================= PLANETS ================= -->
  <!-- orbit 1: small brown -->
  <circle cx="26" cy="145" r="5" fill="#6b4a2f" stroke="#f4ecd9" stroke-width="1.4"/>

  <!-- orbit 2: off-white -->
  <circle cx="65" cy="214" r="7" fill="#f4ecd9" stroke="#6b4a2f" stroke-width="1.6"/>
  <path d="M61 210 C 64 211 66 214 65 218" fill="none" stroke="#6b4a2f" stroke-width="1" opacity="0.7"/>

  <!-- orbit 3: ringed yellow planet -->
  <g>
    <ellipse cx="26" cy="312" rx="19" ry="6" fill="none" stroke="#f4ecd9" stroke-width="2"/>
    <circle cx="26" cy="312" r="9" fill="#e8c44a" stroke="#6b4a2f" stroke-width="1.8"/>
    <ellipse cx="26" cy="312" rx="19" ry="6" fill="none" stroke="#f4ecd9" stroke-width="2"
             stroke-dasharray="22 60" stroke-dashoffset="11"/>
  </g>

  <!-- orbit 4: off-white planet with a moon -->
  <circle cx="60" cy="418" r="8" fill="#f4ecd9" stroke="#6b4a2f" stroke-width="1.6"/>
  <circle cx="60" cy="418" r="3" fill="#6b4a2f" opacity="0.5"/>
  <circle cx="74" cy="408" r="2.6" fill="#e8c44a" stroke="#6b4a2f" stroke-width="1"/>

  <!-- orbit 5: large brown gas giant -->
  <circle cx="35" cy="560" r="12" fill="#6b4a2f" stroke="#f4ecd9" stroke-width="1.8"/>
  <g stroke="#f4ecd9" stroke-width="1" opacity="0.7">
    <path d="M24 556 C 30 554 40 554 46 556"/>
    <path d="M24 562 C 30 564 40 564 46 562"/>
  </g>

  <!-- ================= ASTEROID BELT ================= -->
  <g fill="#6b4a2f">
    <circle cx="20" cy="648" r="1.6"/><circle cx="34" cy="656" r="1.3"/>
    <circle cx="48" cy="650" r="1.7"/><circle cx="60" cy="660" r="1.2"/>
    <circle cx="70" cy="652" r="1.5"/><circle cx="28" cy="666" r="1.2"/>
    <circle cx="54" cy="668" r="1.4"/><circle cx="42" cy="662" r="1.1"/>
  </g>

  <!-- ================= LITTLE CONSTELLATION ================= -->
  <g stroke="#f4ecd9" stroke-width="1" opacity="0.8" fill="none">
    <path d="M20 712 L34 730 L52 724 L60 744 L42 762 L28 752 Z"/>
  </g>
  <g fill="#e8c44a" stroke="#6b4a2f" stroke-width="0.8">
    <circle cx="20" cy="712" r="2.2"/><circle cx="34" cy="730" r="2"/>
    <circle cx="52" cy="724" r="2.4"/><circle cx="60" cy="744" r="2"/>
    <circle cx="42" cy="762" r="2.6"/><circle cx="28" cy="752" r="1.8"/>
  </g>

  <!-- annotations -->
  <text x="84" y="250" fill="#f4ecd9" opacity="0.85" font-family="monospace" font-size="8" transform="rotate(-90 84 250)">FIG. — THE SKY</text>
  <text x="10" y="800" fill="#f4ecd9" opacity="0.85" font-family="monospace" font-size="7.5">ORRERY · II</text>
</svg>
